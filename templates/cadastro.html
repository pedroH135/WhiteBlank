<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastro</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Cadastro</h1>

        <form method="POST">

            <input type="text"
                   name="usuario"
                   placeholder="Usuário"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="senha"
                   placeholder="Senha"
                   required>

            <button type="submit">

                Cadastrar

            </button>

        </form>

        <a href="/" class="cadastro-link">

            Voltar

        </a>

    </div>

</body>

</html>
