<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="welcome">

        <h1>Seja bem vindo ao WhiteBlank</h1>

        <p>Seu site de gestão de materiais</p>

    </div>

    <div class="container">

        <h1>Login</h1>

        <form method="POST">

            <input type="email"
                   name="email"
                   placeholder="Email"
                   required>

            <input type="password"
                   name="senha"
                   placeholder="Senha"
                   required>

            <button type="submit">
                Entrar
            </button>

        </form>

        <a href="/cadastro" class="cadastro-link">

            Não possui conta?

        </a>

    </div>

</body>

</html>
